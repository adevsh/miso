# atlantis.yaml
#
# Repository-side Atlantis project configuration for miso.
# Atlantis reads this file from the repo root, while `dir: infra` tells it
# where the OpenTofu root module lives inside the repository.

version: 3
projects:
  - name: miso-infra
    dir: infra
    terraform_distribution: opentofu
    terraform_version: v1.9.0
    autoplan:
      when_modified:
        - "*.tf"
        - "*.tfvars"
      enabled: true
