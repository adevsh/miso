# repos.yaml
#
# Server-side Atlantis repository policy for miso.
# Keep approval and mergeability requirements here instead of in repo-side
# `atlantis.yaml` so PR authors cannot weaken apply protections from a branch.

repos:
  - id: github.com/adevsh/miso
    # Public repos should require review and a mergeable PR before apply.
    apply_requirements:
      - approved
      - mergeable
